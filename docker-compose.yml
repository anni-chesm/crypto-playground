version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto-backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=crypto-playground-jwt-secret-2024-secure
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    networks:
      - crypto-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-frontend
    restart: unless-stopped
    networks:
      - crypto-net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: crypto-nginx
    ports:
      - "8001:443"
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - crypto-net

volumes:
  backend-data:

networks:
  crypto-net:
    driver: bridge
